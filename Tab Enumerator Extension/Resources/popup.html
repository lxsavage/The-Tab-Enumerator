<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="popup.css" />
        <script type="module" src="popup.js"></script>
    </head>
    <body>
        <img id="header-icon" src="images/icon-128.png" alt="Tab Enumerator Icon" />
        <h2>
            <span id="tte-name"></span>
            <span class="version">v<b id="tte-version"></span>
        </h2>

        Hold <span id="modifier">CTRL</span> to see tabs accessible by keyboard
